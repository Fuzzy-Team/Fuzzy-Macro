                                        <h4 class="poppins-regular" style = "margin-top:0.5rem">Inf:</h4>
                                        <div class="poppins-regular" style="font-size:0.9rem; color: #adb4bc">Repeat<br>infinitely</div>
                                    </div>
                                    ${buildInput(`blender_repeat_inf_${i}`, {name: "checkbox", triggerFunction: "saveSetting(this, 'profile')"})}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
        blenderParent.innerHTML += blenderItemHTML;
      }
    </script>
