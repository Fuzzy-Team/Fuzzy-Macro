<div class="main-content-container">
  <div id="boost-nav" class="sub-nav-bar">
    <div id="boost-hotbar" class="boost-tab-item">Hotbar</div>
    <div id="boost-buffs" class="boost-tab-item">Buffs</div>
  </div>
  <div id="boost-hotbar-tab" class="standard-container sub-tab-panel active">
    <script>
      const hotbarParent = document.getElementById("boost-hotbar-tab");
      const boostHotbarSlots = [
        { slot: 1 },
        { slot: 2 },
        { slot: 3 },
        { slot: 4 },
        { slot: 5 },
        { slot: 6 },
        { slot: 7 },
      ];
      const useWhenOptions = ["Never", "Always", "Gathering", "Converting", "Attacking"];
      const useEveryOptions = ["Secs", "Mins"];

      hotbarParent.innerHTML = `
        <div class="poppins-medium standard-container boost-hotbar-shell">
          <h2 id="hotbar">Hotbar</h2>
          <p style="font-weight:500; font-size:1rem;">Choose a slot from the bar and configure when it should activate.</p>
          <div class="seperator"></div>
          <div class="boost-hotbar-strip" id="boost-hotbar-strip"></div>
          <div class="boost-hotbar-panels" id="boost-hotbar-panels"></div>
        </div>
      `;

      const strip = document.getElementById("boost-hotbar-strip");
      const panels = document.getElementById("boost-hotbar-panels");

      boostHotbarSlots.forEach(({ slot }) => {
        strip.innerHTML += `
          <button type="button" id="boost-slot-${slot}" class="boost-hotbar-slot" onclick="switchBoostHotbarSlot(${slot})" title="Slot ${slot}">
            <span class="boost-hotbar-slot-number">[${slot}]</span>
            <span class="boost-hotbar-slot-frame">
              <span class="boost-hotbar-slot-empty"></span>
            </span>
          </button>
        `;

        panels.innerHTML += `
          <div id="boost-hotbar-slot-${slot}-panel" class="boost-hotbar-panel">
            <div class="boost-hotbar-panel-header">
              <div class="boost-hotbar-panel-icon boost-hotbar-panel-icon-empty">
                <span class="boost-hotbar-slot-empty"></span>
              </div>
              <div>
                <h3 class="poppins-semibold">Slot ${slot}</h3>
                <p class="poppins-regular">Configure when this hotbar slot should be used.</p>
              </div>
            </div>
            <form class="boost-hotbar-form-row">
              <div class="boost-hotbar-form-copy">
                <label>Use When</label>
                <p>Choose the condition that allows this slot to be used.</p>
              </div>
              ${buildInput(`hotbar${slot}_use_when`, {
                name: "dropdown",
                data: useWhenOptions,
                triggerFunction: saveProfileTriggerFunction,
              })}
            </form>
            <form class="boost-hotbar-form-row">
              <div class="boost-hotbar-form-copy">
                <label>Use Every</label>
                <p>Set the cooldown for repeated use of this slot.</p>
              </div>
              <div class="boost-hotbar-frequency">
                ${buildInput(`hotbar${slot}_use_every_value`, {
                  name: "textbox",
                  inputType: "float",
                  triggerFunction: saveProfileTriggerFunction,
                  length: 8,
                })}
                ${buildInput(`hotbar${slot}_use_every_format`, {
                  name: "dropdown",
                  data: useEveryOptions,
                  triggerFunction: saveProfileTriggerFunction,
                  length: 6,
                }).replace("0.6rem", "0")}
              </div>
            </form>
          </div>
        `;
      });
    </script>
  </div>

      buildStandardContainer(buffsParent, "Sticker Stack <img src='./assets/icons/sticker_stack.png' style='margin-left:0.4rem; height: 1.3rem;'>", "", [

        {

      ]);
    </script>
  </div>
</div>
