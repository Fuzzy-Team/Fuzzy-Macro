<div id="home-parent" class="flex-col gap-md">
  <!-- Top Row: Control and Mode -->
  <div class="flex-row gap-md">
    <div class="poppins-semibold standard-container flex-1">
      <h2>Macro Control
        <button class="purple-button ml-auto d-none" id="stop-btn">Stop [F3]</button>
        <button class="purple-button ml-auto" id="start-btn">Start [F1]</button>
      </h2>
    </div>
    <div class="poppins-semibold standard-container flex-1">
      <div class="home-mode-header">
        <h2>Macro Mode</h2>
        <select id="macro_mode" aria-label="Macro Mode">
          <option value="normal">Normal Mode</option>
          <option value="field">Field Mode</option>
          <option value="quest">Quest Mode</option>
          <option value="bug">Bug Run Mode</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Bottom Row: Tasks/Planters and Logs -->
  <div class="flex-row gap-md flex-grow-1" style="min-height: 0;">
    <!-- Left Column: Tasks and Planters -->
    <div class="flex-col flex-1 gap-md">
      <div class="poppins-medium standard-container flex-grow-1 overflow-y-auto" style="min-height: 15rem;">
        <h2>Tasks</h2>
        <div id="task-list" class="task-list-scroll w-100"></div>
      </div>
      <div class="poppins-medium standard-container flex-col" id="planter-timers-container">
        <div class="flex-row space-between">
          <h2>Planter Timers</h2>
          <button class="purple-button" id="clear-timers-btn">
            Reset All Timers
          </button>
        </div>
        <div class="planter-timers"></div>
      </div>
    </div>

    <!-- Right Column: Logs -->
    <div class="flex-col flex-1 gap-md">
      <div class="poppins-regular standard-container flex-grow-1 flex-col gap-xs home-logs-container">
        <div class="home-logs-header flex-row space-between align-items-center mb-05 border-bottom">
          <div class="home-logs-title-row">
            <h2 style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">Logs</h2>
            <div class="home-log-tabs" role="tablist" aria-label="Log type">
              <button class="home-log-tab active" type="button" role="tab" aria-selected="true"
                data-log-tab="macro">Macro Logs</button>
              <button class="home-log-tab" type="button" role="tab" aria-selected="false"
                data-log-tab="dev">Dev Logs</button>
            </div>
          </div>
          <div class="flex-row gap-xs">
            <button class="purple-button" id="export-logs-btn"
              style="margin-top: 0; padding: 0.3rem 0.6rem; font-size: 0.8rem;">Export</button>
            <button class="purple-button" id="clear-logs-btn"
              style="margin-top: 0; padding: 0.3rem 0.6rem; font-size: 0.8rem;">Clear</button>
          </div>
        </div>
        <div id="macro-logs-panel" class="log-panel flex-col gap-xs overflow-y-auto flex-grow-1">
          <div id="logs" class="flex-col gap-xs overflow-y-auto flex-grow-1">
            <!-- Macro logs will be appended here -->
          </div>
        </div>
        <div id="dev-logs-panel" class="log-panel d-none flex-col gap-xs overflow-y-auto flex-grow-1">
          <div id="dev-logs" class="flex-col gap-xs overflow-y-auto flex-grow-1"></div>
        </div>
      </div>
    </div>
  </div>
</div>
